<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BHROMAON – Safe Travel Anywhere</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%234a5de8'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='18' font-family='serif' fill='white'>B</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- HERO -->
  <section class="hero" id="home" aria-label="Hero">
    <img class="bg-img" src="images/hero-bg.png" alt="">
    <div class="bg-content" style="display:flex;flex-direction:column;align-items:center;width:100%;">
      <h1 class="hero__logo">BHROMAON</h1>
      <p class="hero__tagline">Safe Travel Anywhere</p>
      <div class="hero__search" role="search">
        <label for="dest-search" class="sr-only">Search destination</label>
        <input type="text" id="dest-search" placeholder="Search Your Travel Destination">
        <button type="button"><i class="fa fa-search" aria-hidden="true"></i> Search</button>
      </div>
      <button class="hero__scroll" aria-label="Scroll down to content">
        <span>Scroll Down</span>
        <i class="fa fa-chevron-down" aria-hidden="true"></i>
      </button>
    </div>
  </section>

</body>
</html>
